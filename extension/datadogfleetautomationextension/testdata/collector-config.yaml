receivers:
  otlp:
    protocols:
      grpc:
      http:
exporters:
  datadog:
    api:
      key: ${env:DD_API_KEY}
  debug:
processors:
  batch:
    timeout: 10s
extensions:
  datadogfleetautomation:
    api: 
      key: ${env:DD_API_KEY}
      site: datadoghq.com
  healthcheckv2:
    use_v2: true
    component_health:
      include_permanent_errors: false
      include_recoverable_errors: true
      recovery_duration: 5m
    http:
service:
  extensions: [healthcheckv2, datadogfleetautomation]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
